<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProQuest 批次自動化生成器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🤖</text></svg>">
    <style>
        /* 自訂簡單的捲軸樣式 */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="min-h-screen bg-slate-50 p-4 md:p-8 text-slate-900 font-sans">
    <div class="max-w-4xl mx-auto space-y-6">
        
        <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
            <div class="flex items-center gap-3 mb-2">
                <i class="ph ph-shield-check text-3xl text-emerald-500"></i>
                <h1 class="text-2xl font-bold">ProQuest 助手 (多模式整合版)</h1>
                <span class="bg-emerald-100 text-emerald-700 text-xs px-2 py-1 rounded-full font-semibold border border-emerald-200">v1.1.19 (2026/04/22 更新)</span>
            </div>
            <p class="text-slate-500 text-sm">此版本支援產生不同情境的自動化腳本。請先選擇您需要的模式，設定好參數後再點擊複製。</p>
        </div>

        <div class="flex p-1 space-x-1 bg-slate-200 rounded-xl">
            <button id="tabBrowse" class="w-full py-3 text-sm font-bold rounded-lg bg-white shadow text-sky-600 transition-all flex items-center justify-center gap-2">
                <i class="ph ph-cursor-click text-lg"></i> 模式一：逐筆瀏覽
            </button>
            <button id="tabPrint" class="w-full py-3 text-sm font-bold rounded-lg text-slate-500 hover:bg-slate-100 hover:text-slate-700 transition-all flex items-center justify-center gap-2">
                <i class="ph ph-printer text-lg"></i> 模式二：批次列印 (v1.1.19)
            </button>
        </div>

        <div class="bg-white p-6 rounded-2xl border border-slate-200 space-y-4">
            
            <label class="block border-b border-slate-100 pb-4">
                <div class="flex items-center justify-between mb-2">
                    <span class="text-sm font-semibold flex items-center gap-2">
                        <i class="ph ph-list-dashes text-lg text-sky-500"></i> 共用搜尋詞清單 (每行一個)
                    </span>
                    <div>
                        <input type="file" id="fileInput" accept=".txt" class="hidden">
                        <button id="importBtn" class="text-xs flex items-center gap-1 bg-slate-100 hover:bg-slate-200 text-slate-600 py-1 px-3 rounded-lg transition-colors border border-slate-200">
                            <i class="ph ph-folder-open"></i> 匯入 TXT
                        </button>
                    </div>
                </div>
                <textarea id="keywordsInput" class="w-full h-32 p-3 bg-slate-50 border border-slate-200 rounded-xl font-mono text-sm focus:ring-2 focus:ring-sky-500 outline-none transition-all" placeholder="例如：&#10;COVID-19 Economics&#10;Social Media Psychology"></textarea>
            </label>
            
            <div id="browseParams" class="flex flex-col sm:flex-row gap-4 items-center animate-fade-in">
                <label class="flex-1 w-full">
                    <span class="text-xs font-medium text-slate-500">啟動時的「預設」瀏覽筆數</span>
                    <input id="targetCountInput" type="number" value="50" class="w-full mt-1 px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-sky-500 outline-none transition-all">
                </label>
                <label class="flex-1 w-full">
                    <span class="text-xs font-medium text-slate-500">啟動時的「預設」翻頁間隔 (毫秒)</span>
                    <input id="delayInput" type="number" value="100" class="w-full mt-1 px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-sky-500 outline-none transition-all">
                </label>
            </div>

            <div id="printParams" class="flex flex-col sm:flex-row gap-4 items-start hidden animate-fade-in">
                <label class="flex-1 w-full">
                    <span class="text-xs font-medium text-slate-500">啟動時的「預設」列印筆數</span>
                    <input id="printCountInput" type="number" step="100" min="100" value="100" class="w-full mt-1 px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-emerald-500 outline-none transition-all">
                    <span class="text-xs text-rose-500 mt-1 block font-bold">* 必須為 100 的倍數</span>
                </label>
            </div>
            
            <button id="copyBtn" class="w-full py-4 mt-2 bg-sky-500 hover:bg-sky-600 text-white font-bold rounded-xl shadow-lg transition-all active:scale-95 flex items-center justify-center gap-2">
                <i class="ph ph-copy text-xl" id="copyIcon"></i>
                <span id="copyText">複製「逐筆瀏覽」腳本</span>
            </button>
        </div>

        <div class="bg-sky-50 p-6 rounded-2xl border border-sky-200 flex gap-4">
            <i class="ph ph-info text-2xl text-sky-600 shrink-0"></i>
            <div class="text-sm text-sky-900 space-y-2">
                <p class="font-bold underline">操作說明：</p>
                <p>請先在上方點擊頁籤切換您要產生的腳本類型。兩種模式產生的 Tampermonkey 腳本功能互相獨立，請依照您當下的作業需求選擇對應的腳本進行複製與安裝。</p>
            </div>
        </div>
    </div>

    <script>
        // === 取得 DOM 元素 ===
        const keywordsInput = document.getElementById('keywordsInput');
        const targetCountInput = document.getElementById('targetCountInput');
        const delayInput = document.getElementById('delayInput');
        const printCountInput = document.getElementById('printCountInput');
        
        const copyBtn = document.getElementById('copyBtn');
        const copyIcon = document.getElementById('copyIcon');
        const copyText = document.getElementById('copyText');
        
        const importBtn = document.getElementById('importBtn');
        const fileInput = document.getElementById('fileInput');

        const tabBrowse = document.getElementById('tabBrowse');
        const tabPrint = document.getElementById('tabPrint');
        const browseParams = document.getElementById('browseParams');
        const printParams = document.getElementById('printParams');

        // === 狀態管理 ===
        let currentMode = 'browse'; 
        const STORAGE_KEY = 'pq_generator_keywords';

        // === 頁籤切換邏輯 ===
        function switchTab(mode) {
            currentMode = mode;
            if (mode === 'browse') {
                tabBrowse.className = "w-full py-3 text-sm font-bold rounded-lg bg-white shadow text-sky-600 transition-all flex items-center justify-center gap-2";
                tabPrint.className = "w-full py-3 text-sm font-bold rounded-lg text-slate-500 hover:bg-slate-100 hover:text-slate-700 transition-all flex items-center justify-center gap-2";
                browseParams.classList.remove('hidden');
                printParams.classList.add('hidden');
                copyBtn.className = "w-full py-4 mt-2 bg-sky-500 hover:bg-sky-600 text-white font-bold rounded-xl shadow-lg transition-all active:scale-95 flex items-center justify-center gap-2";
                copyText.textContent = "複製「逐筆瀏覽」腳本";
            } else {
                tabPrint.className = "w-full py-3 text-sm font-bold rounded-lg bg-white shadow text-emerald-600 transition-all flex items-center justify-center gap-2";
                tabBrowse.className = "w-full py-3 text-sm font-bold rounded-lg text-slate-500 hover:bg-slate-100 hover:text-slate-700 transition-all flex items-center justify-center gap-2";
                browseParams.classList.add('hidden');
                printParams.classList.remove('hidden');
                copyBtn.className = "w-full py-4 mt-2 bg-emerald-500 hover:bg-emerald-600 text-white font-bold rounded-xl shadow-lg transition-all active:scale-95 flex items-center justify-center gap-2";
                copyText.textContent = "複製「批次列印」腳本";
            }
        }

        tabBrowse.addEventListener('click', () => switchTab('browse'));
        tabPrint.addEventListener('click', () => switchTab('print'));

        // === 自動儲存與檔案匯入 ===
        window.addEventListener('DOMContentLoaded', () => {
            const savedKeywords = localStorage.getItem(STORAGE_KEY);
            if (savedKeywords) keywordsInput.value = savedKeywords;
        });

        keywordsInput.addEventListener('input', () => {
            localStorage.setItem(STORAGE_KEY, keywordsInput.value);
        });

        importBtn.addEventListener('click', () => fileInput.click());

        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                const content = e.target.result;
                keywordsInput.value = content;
                localStorage.setItem(STORAGE_KEY, content);
            };
            reader.readAsText(file);
            fileInput.value = '';
        });

        // === 腳本生成核心 ===
        function generateScript() {
            const rawKeywords = keywordsInput.value;
            const keywordArray = rawKeywords.split('\n').filter(k => k.trim() !== '');
            const keywordJson = JSON.stringify(keywordArray);

            if (currentMode === 'browse') {
                const defaultTargetCount = targetCountInput.value;
                const defaultDelay = delayInput.value;
                
                return `// ==UserScript==
// @name         ProQuest 深度自動化批次助手 (模式一：逐筆瀏覽)
// @namespace    http://tampermonkey.net/
// @version      3.2.3
// @description  完整流程：搜尋 -> 逐筆瀏覽達標 -> 返回首頁 -> 換詞循環
// @author       Gemini Assistant
// @match        *://www.proquest.com/*
// @run-at       document-start
// @grant        GM_addStyle
// @grant        GM_log
// ==/UserScript==

(function() {
    'use strict';

    const SELECTORS = {
        searchBox:   'textarea#searchTerm, input#searchTerm, input[name="searchTerm"]', 
        fullTextCb:  'input#fullTextLimit, input#ft, input[name="isFullText"]',          
        searchBtn:   'a#expandedSearch, #searchSubmit, .searchButton',                
        firstFullTextLink: 'a[id^="addFlashPageParameterformat_fulltext_"]',
        nextDocBtn:        'a#nextLink, li.results-nav-spacing a#nextLink',
        closeModalBtn:     '#closeWarningModalLink, #endSessionWarningCarryOn, button.close, .ui-dialog-titlebar-close'
    };

    const KEYWORDS = ${keywordJson};

    const log = (msg) => {
        console.log("%c[PQ-Auto-瀏覽] " + msg, "color: white; background: #0ea5e9; padding: 4px 8px; font-weight: bold; border-radius: 4px; font-size: 13px;");
    };

    const getState = () => {
        try {
            return JSON.parse(localStorage.getItem('pq_auto_state')) || { 
                keywordIndex: 0, viewedCount: 0, phase: 'IDLE', maxKeywords: KEYWORDS.length, targetCount: ${defaultTargetCount}, stepDelay: ${defaultDelay}, accountId: null
            };
        } catch(e) { 
            return { keywordIndex: 0, viewedCount: 0, phase: 'IDLE', maxKeywords: KEYWORDS.length, targetCount: ${defaultTargetCount}, stepDelay: ${defaultDelay}, accountId: null }; 
        }
    };
    const saveState = (s) => localStorage.setItem('pq_auto_state', JSON.stringify(s));

    const getBaseUrl = (accId) => {
        return accId ? "https://www.proquest.com/index?accountid=" + accId : "https://www.proquest.com/index";
    };

    const waitForElement = (selector, timeout = 15000, requireVisible = true) => {
        return new Promise((resolve) => {
            const checkEl = () => {
                const el = document.querySelector(selector);
                if (!el) return null;
                if (!requireVisible) return el;
                const rect = el.getBoundingClientRect();
                if (rect.width > 0 && rect.height > 0) return el;
                return null;
            };

            const initialEl = checkEl();
            if (initialEl) return resolve(initialEl);

            const observer = new MutationObserver(() => {
                const el = checkEl();
                if (el) { observer.disconnect(); resolve(el); }
            });
            observer.observe(document.documentElement, { childList: true, subtree: true, attributes: true, attributeFilter: ['style', 'class'] });
            setTimeout(() => { observer.disconnect(); resolve(null); }, timeout);
        });
    };

    const run = async () => {
        let state = getState();
        
        // 【記憶 Account ID 機制】
        const urlAccId = new URLSearchParams(window.location.search).get('accountid');
        if (urlAccId && state.accountId !== urlAccId) {
            state.accountId = urlAccId;
            saveState(state);
        }

        if (state.phase === 'IDLE') return;

        const TARGET_COUNT = state.targetCount || ${defaultTargetCount};
        const STEP_DELAY = state.stepDelay || ${defaultDelay};

        try {
            const modalBtn = document.querySelector(SELECTORS.closeModalBtn);
            if (modalBtn && modalBtn.offsetParent !== null) modalBtn.click();
        } catch(e) {}

        const limit = state.maxKeywords || KEYWORDS.length;
        if (state.keywordIndex >= limit || state.keywordIndex >= KEYWORDS.length) {
            log("🎉 本次設定的關鍵字任務已全部完成！");
            saveState({...state, phase: 'IDLE'});
            return;
        }

        const currentKeyword = KEYWORDS[state.keywordIndex];
        const isSearchPage = location.pathname === '/' || location.pathname.startsWith('/index') || location.href.includes('/search') || location.search.includes('accountid');
        
        if (state.phase === 'START_SEARCH' && isSearchPage) {
            log(\`準備輸入第 \${state.keywordIndex + 1}/\${limit} 個關鍵字: "\${currentKeyword}"\`);
            try {
                const targetSearchBox = await waitForElement(SELECTORS.searchBox);
                if (targetSearchBox) {
                    const fullTextCb = document.querySelector(SELECTORS.fullTextCb);
                    if (fullTextCb && !fullTextCb.checked) fullTextCb.click();
                    
                    targetSearchBox.value = currentKeyword;
                    targetSearchBox.dispatchEvent(new Event('input', { bubbles: true }));
                    
                    state.phase = 'WAITING_FOR_RESULTS';
                    state.viewedCount = 0; 
                    saveState(state);
                    
                    setTimeout(() => {
                        const btn = document.querySelector(SELECTORS.searchBtn);
                        if (btn) btn.click();
                        else if (targetSearchBox.closest('form')) targetSearchBox.closest('form').submit();
                    }, 1500);
                }
            } catch (err) {}
        }

        if (location.href.includes('/results')) {
            if (state.phase === 'WAITING_FOR_RESULTS') {
                setTimeout(async () => {
                    const firstLink = await waitForElement(SELECTORS.firstFullTextLink);
                    if (firstLink) {
                        firstLink.click();
                        state.phase = 'VIEWING_DOCUMENT';
                        state.viewedCount = 1;
                        saveState(state);
                    } else {
                        state.phase = 'PAUSED_FOR_TESTING';
                        saveState(state);
                    }
                }, 2000);
            }
        }

        if (location.href.includes('/docview')) {
            if (state.phase === 'VIEWING_DOCUMENT') {
                log(\`📖 關鍵字 "\${currentKeyword}" -> 正在瀏覽第 \${state.viewedCount} 筆資料...\`);

                if (state.viewedCount >= TARGET_COUNT) {
                    log(\`🎉 關鍵字 "\${currentKeyword}" 已經達到目標 \${TARGET_COUNT} 筆！\`);
                    state.keywordIndex += 1;
                    
                    const limit = state.maxKeywords || KEYWORDS.length;
                    if (state.keywordIndex >= limit || state.keywordIndex >= KEYWORDS.length) {
                        state.phase = 'IDLE';
                        saveState(state);
                        alert("✅ ProQuest 自動化本次任務全數完成！");
                        return;
                    } else {
                        state.phase = 'START_SEARCH';
                        state.viewedCount = 0;
                        saveState(state);
                        setTimeout(() => { window.location.href = getBaseUrl(state.accountId); }, 3000);
                        return; 
                    }
                }

                setTimeout(async () => {
                    const nextBtn = await waitForElement(SELECTORS.nextDocBtn);
                    if (nextBtn) {
                        state.viewedCount += 1;
                        saveState(state);
                        if (nextBtn.tagName.toLowerCase() === 'a' && nextBtn.href) window.location.href = nextBtn.href;
                        else nextBtn.click();
                    } else {
                        state.phase = 'PAUSED_FOR_TESTING';
                        saveState(state);
                    }
                }, STEP_DELAY);
            }
        }
    };

    const injectUI = () => {
        if (document.getElementById('pq-auto-panel')) return;
        const panel = document.createElement('div');
        panel.id = 'pq-auto-panel';
        panel.style = "position:fixed; top:20px; right:20px; z-index:2147483647; background:white; padding:15px; border:4px solid #0ea5e9; border-radius:12px; box-shadow: 0 10px 40px rgba(0,0,0,0.5); width:180px; text-align:center; font-family: Arial, sans-serif;";
        panel.innerHTML = \`
            <div style="font-size:14px; font-weight:bold; color:#0ea5e9; margin-bottom:10px;">ProQuest 逐筆助手</div>
            <button id="pq-start" style="width:100%; background:#28a745; color:white; border:none; padding:10px; border-radius:8px; cursor:pointer; font-weight:bold; margin-bottom:5px;">🚀 啟動完整循環</button>
            <button id="pq-reset" style="width:100%; background:#6c757d; color:white; border:none; padding:8px; border-radius:8px; cursor:pointer; font-size:12px;">🛑 重置進度</button>
        \`;
        (document.body || document.documentElement).appendChild(panel);
        
        document.getElementById('pq-start').onclick = () => {
            const totalListCount = KEYWORDS.length;
            const runCountInput = window.prompt("目前清單共有 " + totalListCount + " 個關鍵字。\\n請問本次任務要執行「幾個」關鍵字？", totalListCount);
            if (runCountInput === null) return; 
            let runCount = parseInt(runCountInput, 10);
            if (isNaN(runCount) || runCount <= 0) return;

            const startInput = window.prompt("請問要從第幾個關鍵字開始執行？\\n(輸入 1 代表從第 1 個開始，上限為 " + totalListCount + ")", 1);
            if (startInput === null) return;
            let startIdx = parseInt(startInput, 10);
            if (isNaN(startIdx) || startIdx <= 0) startIdx = 1;
            if (startIdx > totalListCount) startIdx = totalListCount;
            
            const actualStartIndex = startIdx - 1;
            let endLimit = actualStartIndex + runCount;
            if (endLimit > totalListCount) {
                endLimit = totalListCount;
                runCount = endLimit - actualStartIndex;
            }

            const countInput = window.prompt("請確認每個詞的「目標瀏覽筆數」：", ${defaultTargetCount});
            if (countInput === null) return;
            const tCount = parseInt(countInput, 10);
            if (isNaN(tCount) || tCount <= 0) return;

            const delayInput = window.prompt("請確認「翻頁間隔」時間 (毫秒)：", ${defaultDelay});
            if (delayInput === null) return;
            const tDelay = parseInt(delayInput, 10);
            if (isNaN(tDelay) || tDelay < 0) return;

            const totalDocs = runCount * tCount;
            const confirmMsg = "請確認本次任務資訊：\\n\\n執行範圍：第 " + startIdx + " 個 到 第 " + endLimit + " 個關鍵字\\n總計執行單字：" + runCount + " 個\\n每個詞的瀏覽筆數：" + tCount + " 筆\\n-------------------------\\n總計：" + totalDocs + " 篇\\n\\n翻頁間隔：" + tDelay + " 毫秒\\n\\n按下「確定」開始運行腳本！";
            if (!window.confirm(confirmMsg)) return; 
            
            saveState({ keywordIndex: actualStartIndex, viewedCount: 0, phase: 'START_SEARCH', maxKeywords: endLimit, targetCount: tCount, stepDelay: tDelay, accountId: getState().accountId });
            location.reload(); 
        };
        
        document.getElementById('pq-reset').onclick = () => {
            saveState({ keywordIndex: 0, viewedCount: 0, phase: 'IDLE', accountId: null });
            location.reload();
        };
    };

    if (document.readyState === 'loading') { window.addEventListener('DOMContentLoaded', () => { setInterval(injectUI, 2000); run(); }); } 
    else { setInterval(injectUI, 2000); run(); }
})();`;
            } else if (currentMode === 'print') {
                const defaultPrintCount = printCountInput.value;
                
                return `// ==UserScript==
// @name         ProQuest 深度自動化批次助手 (模式二：批次列印)
// @namespace    http://tampermonkey.net/
// @version      1.1.19
// @description  全自動化正式版：拔除原生隱藏標籤陷阱，徹底修復 100 筆下拉選單跨電腦點擊失效問題
// @author       Gemini Assistant
// @match        *://www.proquest.com/*
// @run-at       document-start
// @grant        GM_addStyle
// @grant        GM_log
// ==/UserScript==

(function() {
    'use strict';

    const SELECTORS = {
        searchBox:   'textarea#searchTerm, input#searchTerm, input[name="searchTerm"]', 
        fullTextCb:  'input#fullTextLimit, input#ft, input[name="isFullText"]',          
        searchBtn:   'a#expandedSearch, #searchSubmit, .searchButton',                
        
        itemsCombo:   '#itemsPerPage-combo',          
        itemsListbox: '#itemsPerPage-listbox',        
        selectAllCb:  'input#mlcbAll, #selectall, .select-all-checkbox',
        nextPageBtn:  'li.next a, a[title="Next page"], a[title="下一頁"], [aria-label="Next page"]',

        exportMenuBtn: 'a#allSaveOptionsLink, a[title*="所有儲存"], a[title*="All save"]',
        printBtn:      'a#printLink, a[title="Print" i], a[title="列印" i], a[title="Print document" i], [data-format="print"], .format-print',

        deselectCb:    'input#deselectItems, input[name="deselectItems"], input#removeSelectedAfterExport, input[name="removeSelectedAfterExport"]',
        captcha
