<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProQuest 批次自動化生成器</title>
    <!-- 引入 Tailwind CSS (CDN 方式，免安裝) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 Phosphor Icons 圖標庫 -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        /* 自訂簡單的捲軸樣式 */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="min-h-screen bg-slate-50 p-4 md:p-8 text-slate-900 font-sans">
    <div class="max-w-4xl mx-auto space-y-6">
        
        <!-- 標題區塊 -->
        <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
            <div class="flex items-center gap-3 mb-2">
                <i class="ph ph-shield-check text-3xl text-emerald-500"></i>
                <h1 class="text-2xl font-bold">ProQuest 助手 (v3.2.1)</h1>
            </div>
            <p class="text-slate-500 text-sm">此版本加入了「自動關閉干擾視窗」與「變數隔離防錯機制」，大幅減少 ProQuest 網頁自身 Bug 對自動化腳本造成的影響。</p>
        </div>

        <!-- 設定與產出區塊 -->
        <div class="bg-white p-6 rounded-2xl border border-slate-200 space-y-4">
            <label class="block">
                <div class="flex items-center justify-between mb-2">
                    <span class="text-sm font-semibold flex items-center gap-2">
                        <i class="ph ph-list-dashes text-lg text-sky-500"></i> 搜尋詞清單 (每行一個)
                    </span>
                    <!-- 檔案匯入按鈕 -->
                    <div>
                        <input type="file" id="fileInput" accept=".txt" class="hidden">
                        <button id="importBtn" class="text-xs flex items-center gap-1 bg-slate-100 hover:bg-slate-200 text-slate-600 py-1 px-3 rounded-lg transition-colors border border-slate-200">
                            <i class="ph ph-folder-open"></i> 匯入 TXT
                        </button>
                    </div>
                </div>
                <textarea id="keywordsInput" class="w-full h-32 p-3 bg-slate-50 border border-slate-200 rounded-xl font-mono text-sm focus:ring-2 focus:ring-sky-500 outline-none transition-all" placeholder="例如：&#10;COVID-19 Economics&#10;Social Media Psychology"></textarea>
            </label>
            
            <div class="flex flex-col sm:flex-row gap-4 items-center">
                <label class="flex-1 w-full">
                    <span class="text-xs font-medium text-slate-500">每個詞的目標瀏覽筆數</span>
                    <input id="targetCountInput" type="number" value="50" class="w-full mt-1 px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-sky-500 outline-none transition-all">
                </label>
                <label class="flex-1 w-full">
                    <span class="text-xs font-medium text-slate-500">翻頁間隔 (毫秒)</span>
                    <input id="delayInput" type="number" value="100" class="w-full mt-1 px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-sky-500 outline-none transition-all">
                </label>
            </div>
            
            <button id="copyBtn" class="w-full py-4 bg-emerald-500 hover:bg-emerald-600 text-white font-bold rounded-xl shadow-lg transition-all active:scale-95 flex items-center justify-center gap-2">
                <i class="ph ph-copy text-xl" id="copyIcon"></i>
                <span id="copyText">複製 v3.2.1 腳本</span>
            </button>
        </div>

        <!-- 說明區塊 -->
        <div class="bg-sky-50 p-6 rounded-2xl border border-sky-200 flex gap-4">
            <i class="ph ph-warning-circle text-2xl text-sky-600 shrink-0"></i>
            <div class="text-sm text-sky-900 space-y-2">
                <p class="font-bold underline">重要除錯提示：</p>
                <p>若您在 Tampermonkey 中遇到 <code>searchBox is not defined</code> 等錯誤，請務必先刪除 Tampermonkey 控制面板中所有舊版的腳本，確保沒有舊程式碼在背景干擾！</p>
            </div>
        </div>
    </div>

    <!-- 核心邏輯腳本 -->
    <script>
        // 取得 DOM 元素
        const keywordsInput = document.getElementById('keywordsInput');
        const targetCountInput = document.getElementById('targetCountInput');
        const delayInput = document.getElementById('delayInput');
        const copyBtn = document.getElementById('copyBtn');
        const copyIcon = document.getElementById('copyIcon');
        const copyText = document.getElementById('copyText');
        
        // 取得檔案匯入相關元素
        const importBtn = document.getElementById('importBtn');
        const fileInput = document.getElementById('fileInput');

        // 自動儲存與讀取功能
        const STORAGE_KEY = 'pq_generator_keywords';

        window.addEventListener('DOMContentLoaded', () => {
            const savedKeywords = localStorage.getItem(STORAGE_KEY);
            if (savedKeywords) {
                keywordsInput.value = savedKeywords;
            }
        });

        keywordsInput.addEventListener('input', () => {
            localStorage.setItem(STORAGE_KEY, keywordsInput.value);
        });

        // 處理檔案匯入
        importBtn.addEventListener('click', () => {
            fileInput.click(); 
        });

        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                const content = e.target.result;
                keywordsInput.value = content;
                localStorage.setItem(STORAGE_KEY, content);
            };
            reader.readAsText(file);
            fileInput.value = '';
        });

        // 生成 Tampermonkey 腳本內容的函式
        function generateScript() {
            const rawKeywords = keywordsInput.value;
            const targetCount = targetCountInput.value;
            const delay = delayInput.value;

            // 處理關鍵字字串，轉成 JSON Array 格式
            const keywordArray = rawKeywords.split('\n').filter(k => k.trim() !== '');
            const keywordJson = JSON.stringify(keywordArray);

            // 返回完整的腳本模板字串
            return `// ==UserScript==
// @name         ProQuest 深度自動化批次助手 (v3.2.1)
// @namespace    http://tampermonkey.net/
// @version      3.2.1
// @description  完整流程：搜尋 -> 逐筆瀏覽達標 -> 返回首頁 -> 換詞循環
// @author       Gemini Assistant
// @match        *://www.proquest.com/*
// @run-at       document-start
// @grant        GM_addStyle
// @grant        GM_log
// ==/UserScript==

(function() {
    'use strict';

    // ==========================================
    // 🎯 選擇器集中管理區
    // ==========================================
    const SELECTORS = {
        searchBox:   'textarea#searchTerm, input#searchTerm, input[name="searchTerm"]', 
        fullTextCb:  'input#fullTextLimit, input#ft, input[name="isFullText"]',          
        searchBtn:   'a#expandedSearch, #searchSubmit, .searchButton',                
        firstFullTextLink: 'a[id^="addFlashPageParameterformat_fulltext_"]',
        nextDocBtn:        'a#nextLink, li.results-nav-spacing a#nextLink',
        // 新增：干擾視窗關閉按鈕
        closeModalBtn:     '#closeWarningModalLink, #endSessionWarningCarryOn, button.close, .ui-dialog-titlebar-close'
    };
    // ==========================================

    const KEYWORDS = ${keywordJson};
    const TARGET_COUNT = ${targetCount}; 
    const STEP_DELAY = ${delay}; 

    const log = (msg) => {
        console.log("%c[PQ-Auto-系統] " + msg, "color: white; background: #059669; padding: 4px 8px; font-weight: bold; border-radius: 4px; font-size: 13px;");
    };

    const getState = () => {
        try {
            return JSON.parse(localStorage.getItem('pq_auto_state')) || { 
                keywordIndex: 0, viewedCount: 0, phase: 'IDLE', maxKeywords: KEYWORDS.length 
            };
        } catch(e) { return { keywordIndex: 0, viewedCount: 0, phase: 'IDLE', maxKeywords: KEYWORDS.length }; }
    };
    const saveState = (s) => localStorage.setItem('pq_auto_state', JSON.stringify(s));

    const waitForElement = (selector, timeout = 15000) => {
        return new Promise((resolve) => {
            const el = document.querySelector(selector);
            if (el) return resolve(el);
            const observer = new MutationObserver(() => {
                const el = document.querySelector(selector);
                if (el) { observer.disconnect(); resolve(el); }
            });
            observer.observe(document.documentElement, { childList: true, subtree: true });
            setTimeout(() => { observer.disconnect(); resolve(null); }, timeout);
        });
    };

    const run = async () => {
        let state = getState();
        if (state.phase === 'IDLE') return;

        // 【新增防呆】嘗試關閉可能阻擋畫面的 ProQuest 系統彈出視窗
        try {
            const modalBtn = document.querySelector(SELECTORS.closeModalBtn);
            if (modalBtn && modalBtn.offsetParent !== null) {
                log("⚠️ 偵測到網頁彈出視窗，已自動嘗試關閉...");
                modalBtn.click();
            }
        } catch(e) {}

        const limit = state.maxKeywords || KEYWORDS.length;
        if (state.keywordIndex >= limit || state.keywordIndex >= KEYWORDS.length) {
            log("🎉 本次設定的關鍵字任務已全部完成！");
            saveState({...state, phase: 'IDLE'});
            return;
        }

        const currentKeyword = KEYWORDS[state.keywordIndex];
        const isSearchPage = location.pathname === '/' || location.pathname.startsWith('/index');
        
        if (state.phase === 'START_SEARCH' && isSearchPage) {
            log(\`準備輸入第 \${state.keywordIndex + 1}/\${limit} 個關鍵字: "\${currentKeyword}"\`);
            
            try {
                // 變數更名以避免任何潛在的命名衝突
                const targetSearchBox = await waitForElement(SELECTORS.searchBox);
                if (targetSearchBox) {
                    const fullTextCb = document.querySelector(SELECTORS.fullTextCb);
                    if (fullTextCb && !fullTextCb.checked) fullTextCb.click();
                    
                    targetSearchBox.value = currentKeyword;
                    targetSearchBox.dispatchEvent(new Event('input', { bubbles: true }));
                    
                    state.phase = 'WAITING_FOR_RESULTS';
                    state.viewedCount = 0; 
                    saveState(state);
                    
                    setTimeout(() => {
                        const btn = document.querySelector(SELECTORS.searchBtn);
                        if (btn) {
                            btn.click();
                        } else if (targetSearchBox.closest('form')) {
                            targetSearchBox.closest('form').submit();
                        }
                    }, 1500);
                } else {
                    log("❌ 找不到搜尋框，請確認目前是否在首頁。");
                }
            } catch (err) {
                log("❌ 發生預期外錯誤: " + err.message);
            }
        }

        if (location.href.includes('/results')) {
            if (state.phase === 'WAITING_FOR_RESULTS') {
                setTimeout(async () => {
                    const firstLink = await waitForElement(SELECTORS.firstFullTextLink);
                    if (firstLink) {
                        firstLink.click();
                        state.phase = 'VIEWING_DOCUMENT';
                        state.viewedCount = 1;
                        saveState(state);
                    } else {
                        state.phase = 'PAUSED_FOR_TESTING';
                        saveState(state);
                    }
                }, 2000);
            }
        }

        if (location.href.includes('/docview')) {
            if (state.phase === 'VIEWING_DOCUMENT') {
                log(\`📖 關鍵字 "\${currentKeyword}" -> 正在瀏覽第 \${state.viewedCount} 筆資料...\`);

                if (state.viewedCount >= TARGET_COUNT) {
                    log(\`🎉 關鍵字 "\${currentKeyword}" 已經達到目標 \${TARGET_COUNT} 筆！\`);
                    state.keywordIndex += 1;
                    
                    const limit = state.maxKeywords || KEYWORDS.length;
                    if (state.keywordIndex >= limit || state.keywordIndex >= KEYWORDS.length) {
                        state.phase = 'IDLE';
                        saveState(state);
                        alert("✅ ProQuest 自動化本次任務全數完成！");
                        return;
                    } else {
                        state.phase = 'START_SEARCH';
                        state.viewedCount = 0;
                        saveState(state);
                        setTimeout(() => { window.location.href = "https://www.proquest.com/index?accountid=31253"; }, 3000);
                        return; 
                    }
                }

                setTimeout(async () => {
                    const nextBtn = await waitForElement(SELECTORS.nextDocBtn);
                    if (nextBtn) {
                        state.viewedCount += 1;
                        saveState(state);
                        if (nextBtn.tagName.toLowerCase() === 'a' && nextBtn.href) {
                            window.location.href = nextBtn.href;
                        } else {
                            nextBtn.click();
                        }
                    } else {
                        state.phase = 'PAUSED_FOR_TESTING';
                        saveState(state);
                    }
                }, STEP_DELAY);
            }
        }
    };

    const injectUI = () => {
        if (document.getElementById('pq-auto-panel')) return;
        const panel = document.createElement('div');
        panel.id = 'pq-auto-panel';
        panel.style = "position:fixed; top:20px; right:20px; z-index:2147483647; background:white; padding:15px; border:4px solid #059669; border-radius:12px; box-shadow: 0 10px 40px rgba(0,0,0,0.5); width:180px; text-align:center; font-family: Arial, sans-serif;";
        panel.innerHTML = \`
            <div style="font-size:14px; font-weight:bold; color:#059669; margin-bottom:10px;">ProQuest 助手 v3.2.1</div>
            <button id="pq-start" style="width:100%; background:#28a745; color:white; border:none; padding:10px; border-radius:8px; cursor:pointer; font-weight:bold; margin-bottom:5px;">🚀 啟動完整循環</button>
            <button id="pq-reset" style="width:100%; background:#6c757d; color:white; border:none; padding:8px; border-radius:8px; cursor:pointer; font-size:12px;">🛑 重置進度</button>
        \`;
        (document.body || document.documentElement).appendChild(panel);
        
        document.getElementById('pq-start').onclick = () => {
            const userInput = window.prompt(
                "目前清單共有 " + KEYWORDS.length + " 個關鍵字。\\n請問本次任務要執行前幾個？", 
                KEYWORDS.length
            );
            
            if (userInput === null) return; 
            
            const limit = parseInt(userInput, 10);
            if (isNaN(limit) || limit <= 0 || limit > KEYWORDS.length) {
                alert("輸入無效！請輸入 1 到 " + KEYWORDS.length + " 之間的數字。");
                return;
            }
            
            saveState({ keywordIndex: 0, viewedCount: 0, phase: 'START_SEARCH', maxKeywords: limit });
            
            if (location.pathname !== '/' && !location.pathname.startsWith('/index')) {
                location.href = "https://www.proquest.com/index?accountid=31253"; 
            } else {
                location.reload(); 
            }
        };
        
        document.getElementById('pq-reset').onclick = () => {
            saveState({ keywordIndex: 0, viewedCount: 0, phase: 'IDLE' });
            location.reload();
        };
    };

    if (document.readyState === 'loading') {
        window.addEventListener('DOMContentLoaded', () => {
            setInterval(injectUI, 2000);
            run();
        });
    } else {
        setInterval(injectUI, 2000);
        run();
    }

})();`; 
        }

        // 綁定複製按鈕事件
        copyBtn.addEventListener('click', () => {
            const scriptContent = generateScript();
            
            const textArea = document.createElement("textarea");
            textArea.value = scriptContent;
            textArea.style.position = "fixed";
            textArea.style.left = "-9999px";
            document.body.appendChild(textArea);
            
            textArea.select();
            document.execCommand('copy');
            document.body.removeChild(textArea);
            
            copyIcon.className = "ph ph-check-circle text-xl";
            copyText.textContent = "✅ 已複製 v3.2.1 代碼";
            copyBtn.classList.replace('bg-emerald-500', 'bg-sky-500');
            copyBtn.classList.replace('hover:bg-emerald-600', 'hover:bg-sky-600');
            
            setTimeout(() => {
                copyIcon.className = "ph ph-copy text-xl";
                copyText.textContent = "複製 v3.2.1 腳本";
                copyBtn.classList.replace('bg-sky-500', 'bg-emerald-500');
                copyBtn.classList.replace('hover:bg-sky-600', 'hover:bg-emerald-600');
            }, 2000);
        });
    </script>
</body>
</html>
