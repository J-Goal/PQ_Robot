<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProQuest 批次自動化生成器</title>
    <!-- 引入 Tailwind CSS (CDN 方式，免安裝) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 Phosphor Icons 圖標庫 -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <!-- 網頁標籤 Emoji 小圖示 -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🤖</text></svg>">
    <style>
        /* 自訂簡單的捲軸樣式 */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="min-h-screen bg-slate-50 p-4 md:p-8 text-slate-900 font-sans">
    <div class="max-w-4xl mx-auto space-y-6">
        
        <!-- 標題區塊 -->
        <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
            <div class="flex items-center gap-3 mb-2">
                <i class="ph ph-shield-check text-3xl text-emerald-500"></i>
                <h1 class="text-2xl font-bold">ProQuest 助手 (多模式整合版)</h1>
                <span class="bg-emerald-100 text-emerald-700 text-xs px-2 py-1 rounded-full font-semibold border border-emerald-200">v1.1.22 (2026/04/22 更新)</span>
            </div>
            <p class="text-slate-500 text-sm">此版本支援產生不同情境的自動化腳本。請先選擇您需要的模式，設定好參數後再點擊複製。</p>
        </div>

        <!-- 模式切換頁籤 (Tabs) -->
        <div class="flex p-1 space-x-1 bg-slate-200 rounded-xl">
            <button id="tabBrowse" class="cursor-pointer w-full py-3 text-sm font-bold rounded-lg bg-white shadow text-sky-600 transition-all flex items-center justify-center gap-2">
                <i class="ph ph-cursor-click text-lg"></i> 模式一：逐筆瀏覽
            </button>
            <button id="tabPrint" class="cursor-pointer w-full py-3 text-sm font-bold rounded-lg text-slate-500 hover:bg-slate-100 hover:text-slate-700 transition-all flex items-center justify-center gap-2">
                <i class="ph ph-printer text-lg"></i> 模式二：批次列印 (v1.1.22)
            </button>
        </div>

        <!-- 設定與產出區塊 -->
        <div class="bg-white p-6 rounded-2xl border border-slate-200 space-y-4">
            
            <!-- 共用區塊：關鍵字清單 -->
            <label class="block border-b border-slate-100 pb-4">
                <div class="flex items-center justify-between mb-2">
                    <span class="text-sm font-semibold flex items-center gap-2">
                        <i class="ph ph-list-dashes text-lg text-sky-500"></i> 共用搜尋詞清單 (每行一個)
                    </span>
                    <!-- 檔案匯入按鈕 -->
                    <div>
                        <input type="file" id="fileInput" accept=".txt" class="hidden">
                        <button id="importBtn" class="cursor-pointer text-xs flex items-center gap-1 bg-slate-100 hover:bg-slate-200 text-slate-600 py-1 px-3 rounded-lg transition-colors border border-slate-200">
                            <i class="ph ph-folder-open"></i> 匯入 TXT
                        </button>
                    </div>
                </div>
                <textarea id="keywordsInput" class="w-full h-32 p-3 bg-slate-50 border border-slate-200 rounded-xl font-mono text-sm focus:ring-2 focus:ring-sky-500 outline-none transition-all" placeholder="例如：&#10;COVID-19 Economics&#10;Social Media Psychology"></textarea>
            </label>
            
            <!-- 模式一：逐筆瀏覽的專屬參數 -->
            <div id="browseParams" class="flex flex-col sm:flex-row gap-4 items-center animate-fade-in">
                <label class="flex-1 w-full">
                    <span class="text-xs font-medium text-slate-500">啟動時的「預設」瀏覽筆數</span>
                    <input id="targetCountInput" type="number" value="50" class="w-full mt-1 px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-sky-500 outline-none transition-all">
                </label>
                <label class="flex-1 w-full">
                    <span class="text-xs font-medium text-slate-500">啟動時的「預設」翻頁間隔 (毫秒)</span>
                    <input id="delayInput" type="number" value="100" class="w-full mt-1 px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-sky-500 outline-none transition-all">
                </label>
            </div>

            <!-- 模式二：批次列印的專屬參數 (預設隱藏) -->
            <div id="printParams" class="flex flex-col sm:flex-row gap-4 items-start hidden animate-fade-in">
                <label class="flex-1 w-full">
                    <span class="text-xs font-medium text-slate-500">啟動時的「預設」列印筆數</span>
                    <input id="printCountInput" type="number" step="100" min="100" value="100" class="w-full mt-1 px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-emerald-500 outline-none transition-all">
                    <span class="text-xs text-rose-500 mt-1 block font-bold">* 必須為 100 的倍數</span>
                </label>
            </div>
            
            <!-- 複製按鈕 -->
            <button id="copyBtn" class="cursor-pointer w-full py-4 mt-2 bg-sky-500 hover:bg-sky-600 text-white font-bold rounded-xl shadow-lg transition-all active:scale-95 flex items-center justify-center gap-2">
                <i class="ph ph-copy text-xl" id="copyIcon"></i>
                <span id="copyText">複製「逐筆瀏覽」腳本</span>
            </button>
        </div>

        <!-- 說明區塊 -->
        <div class="bg-sky-50 p-6 rounded-2xl border border-sky-200 flex gap-4">
            <i class="ph ph-info text-2xl text-sky-600 shrink-0"></i>
            <div class="text-sm text-sky-900 space-y-2">
                <p class="font-bold underline">操作說明：</p>
                <p>請先在上方點擊頁籤切換您要產生的腳本類型。兩種模式產生的 Tampermonkey 腳本功能互相獨立，請依照您當下的作業需求選擇對應的腳本進行複製與安裝。</p>
            </div>
        </div>
    </div>

    <!-- 核心邏輯腳本 -->
    <script>
        // === 取得 DOM 元素 ===
        const keywordsInput = document.getElementById('keywordsInput');
        const targetCountInput = document.getElementById('targetCountInput');
        const delayInput = document.getElementById('delayInput');
        const printCountInput = document.getElementById('printCountInput');
        
        const copyBtn = document.getElementById('copyBtn');
        const copyIcon = document.getElementById('copyIcon');
        const copyText = document.getElementById('copyText');
        
        const importBtn = document.getElementById('importBtn');
        const fileInput = document.getElementById('fileInput');

        const tabBrowse = document.getElementById('tabBrowse');
        const tabPrint = document.getElementById('tabPrint');
        const browseParams = document.getElementById('browseParams');
        const printParams = document.getElementById('printParams');

        // === 狀態管理 ===
        let currentMode = 'browse'; 
        const STORAGE_KEY = 'pq_generator_keywords';

        // === 頁籤切換邏輯 ===
        function switchTab(mode) {
            currentMode = mode;
            if (mode === 'browse') {
                tabBrowse.className = "cursor-pointer w-full py-3 text-sm font-bold rounded-lg bg-white shadow text-sky-600 transition-all flex items-center justify-center gap-2";
                tabPrint.className = "cursor-pointer w-full py-3 text-sm font-bold rounded-lg text-slate-500 hover:bg-slate-100 hover:text-slate-700 transition-all flex items-center justify-center gap-2";
                browseParams.classList.remove('hidden');
                printParams.classList.add('hidden');
                copyBtn.className = "cursor-pointer w-full py-4 mt-2 bg-sky-500 hover:bg-sky-600 text-white font-bold rounded-xl shadow-lg transition-all active:scale-95 flex items-center justify-center gap-2";
                copyText.textContent = "複製「逐筆瀏覽」腳本";
            } else {
                tabPrint.className = "cursor-pointer w-full py-3 text-sm font-bold rounded-lg bg-white shadow text-emerald-600 transition-all flex items-center justify-center gap-2";
                tabBrowse.className = "cursor-pointer w-full py-3 text-sm font-bold rounded-lg text-slate-500 hover:bg-slate-100 hover:text-slate-700 transition-all flex items-center justify-center gap-2";
                browseParams.classList.add('hidden');
                printParams.classList.remove('hidden');
                copyBtn.className = "cursor-pointer w-full py-4 mt-2 bg-emerald-500 hover:bg-emerald-600 text-white font-bold rounded-xl shadow-lg transition-all active:scale-95 flex items-center justify-center gap-2";
                copyText.textContent = "複製「批次列印」腳本";
            }
        }

        tabBrowse.addEventListener('click', () => switchTab('browse'));
        tabPrint.addEventListener('click', () => switchTab('print'));

        // === 自動儲存與檔案匯入 ===
        window.addEventListener('DOMContentLoaded', () => {
            const savedKeywords = localStorage.getItem(STORAGE_KEY);
            if (savedKeywords) keywordsInput.value = savedKeywords;
        });

        keywordsInput.addEventListener('input', () => {
            localStorage.setItem(STORAGE_KEY, keywordsInput.value);
        });

        importBtn.addEventListener('click', () => fileInput.click());

        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                const content = e.target.result;
                keywordsInput.value = content;
                localStorage.setItem(STORAGE_KEY, content);
            };
            reader.readAsText(file);
            fileInput.value = '';
        });

        // === 腳本生成核心 ===
        function generateScript() {
            const rawKeywords = keywordsInput.value;
            const keywordArray = rawKeywords.split('\n').filter(k => k.trim() !== '');
            const keywordJson = JSON.stringify(keywordArray);

            if (currentMode === 'browse') {
                const defaultTargetCount = targetCountInput.value;
                const defaultDelay = delayInput.value;
                
                return `// ==UserScript==
// @name         ProQuest 深度自動化批次助手 (模式一：逐筆瀏覽)
// @namespace    http://tampermonkey.net/
// @version      3.2.4
// @description  完整流程：搜尋 -> 逐筆瀏覽達標 -> 返回首頁 -> 換詞循環
// @author       Gemini Assistant
// @match        *://www.proquest.com/*
// @run-at       document-start
// @grant        GM_addStyle
// @grant        GM_log
// ==/UserScript==

(function() {
    'use strict';

    const SELECTORS = {
        searchBox:   'textarea#searchTerm, input#searchTerm, input[name="searchTerm"]', 
        fullTextCb:  'input#fullTextLimit, input#ft, input[name="isFullText"]',          
        searchBtn:   'a#expandedSearch, #searchSubmit, .searchButton',                
        firstFullTextLink: 'a[id^="addFlashPageParameterformat_fulltext_"]',
        nextDocBtn:        'a#nextLink, li.results-nav-spacing a#nextLink',
        closeModalBtn:     '#closeWarningModalLink, #endSessionWarningCarryOn, button.close, .ui-dialog-titlebar-close'
    };

    const KEYWORDS = ${keywordJson};

    const log = (msg) => {
        console.log("%c[PQ-Auto-瀏覽] " + msg, "color: white; background: #0ea5e9; padding: 4px 8px; font-weight: bold; border-radius: 4px; font-size: 13px;");
    };

    const getState = () => {
        try {
            return JSON.parse(localStorage.getItem('pq_auto_state')) || { 
                keywordIndex: 0, viewedCount: 0, phase: 'IDLE', maxKeywords: KEYWORDS.length, targetCount: ${defaultTargetCount}, stepDelay: ${defaultDelay}, accountId: null
            };
        } catch(e) { 
            return { keywordIndex: 0, viewedCount: 0, phase: 'IDLE', maxKeywords: KEYWORDS.length, targetCount: ${defaultTargetCount}, stepDelay: ${defaultDelay}, accountId: null }; 
        }
    };
    const saveState = (s) => localStorage.setItem('pq_auto_state', JSON.stringify(s));

    const getBaseUrl = (accId) => {
        return accId ? "https://www.proquest.com/index?accountid=" + accId : "https://www.proquest.com/index";
    };

    const waitForElement = (selector, timeout = 15000, requireVisible = true) => {
        return new Promise((resolve) => {
            const checkEl = () => {
                const el = document.querySelector(selector);
                if (!el) return null;
                if (!requireVisible) return el;
                const rect = el.getBoundingClientRect();
                if (rect.width > 0 && rect.height > 0) return el;
                return null;
            };

            const initialEl = checkEl();
            if (initialEl) return resolve(initialEl);

            const observer = new MutationObserver(() => {
                const el = checkEl();
                if (el) { observer.disconnect(); resolve(el); }
            });
            observer.observe(document.documentElement, { childList: true, subtree: true, attributes: true, attributeFilter: ['style', 'class'] });
            setTimeout(() => { observer.disconnect(); resolve(null); }, timeout);
        });
    };

    const run = async () => {
        let state = getState();
        
        const urlAccId = new URLSearchParams(window.location.search).get('accountid');
        if (urlAccId && state.accountId !== urlAccId) {
            state.accountId = urlAccId;
            saveState(state);
        }

        if (state.phase === 'IDLE') return;

        const TARGET_COUNT = state.targetCount || ${defaultTargetCount};
        const STEP_DELAY = state.stepDelay || ${defaultDelay};

        try {
            const modalBtn = document.querySelector(SELECTORS.closeModalBtn);
            if (modalBtn && modalBtn.offsetParent !== null) modalBtn.click();
        } catch(e) {}

        const limit = state.maxKeywords || KEYWORDS.length;
        if (state.keywordIndex >= limit || state.keywordIndex >= KEYWORDS.length) {
            log("🎉 本次設定的關鍵字任務已全部完成！");
            saveState({...state, phase: 'IDLE'});
            return;
        }

        const currentKeyword = KEYWORDS[state.keywordIndex];
        const isSearchPage = location.pathname === '/' || location.pathname.startsWith('/index') || location.href.includes('/search') || location.search.includes('accountid');
        
        if (state.phase === 'START_SEARCH' && isSearchPage) {
            log(\`準備輸入第 \${state.keywordIndex + 1}/\${limit} 個關鍵字: "\${currentKeyword}"\`);
            try {
                const targetSearchBox = await waitForElement(SELECTORS.searchBox);
                if (targetSearchBox) {
                    const fullTextCb = document.querySelector(SELECTORS.fullTextCb);
                    if (fullTextCb && !fullTextCb.checked) fullTextCb.click();
                    
                    targetSearchBox.value = currentKeyword;
                    targetSearchBox.dispatchEvent(new Event('input', { bubbles: true }));
                    
                    state.phase = 'WAITING_FOR_RESULTS';
                    state.viewedCount = 0; 
                    saveState(state);
                    
                    setTimeout(() => {
                        const btn = document.querySelector(SELECTORS.searchBtn);
                        if (btn) btn.click();
                        else if (targetSearchBox.closest('form')) targetSearchBox.closest('form').submit();
                    }, 1500);
                }
            } catch (err) {}
        }

        if (location.href.includes('/results')) {
            if (state.phase === 'WAITING_FOR_RESULTS') {
                setTimeout(async () => {
                    const firstLink = await waitForElement(SELECTORS.firstFullTextLink);
                    if (firstLink) {
                        firstLink.click();
                        state.phase = 'VIEWING_DOCUMENT';
                        state.viewedCount = 1;
                        saveState(state);
                    } else {
                        state.phase = 'PAUSED_FOR_TESTING';
                        saveState(state);
                    }
                }, 2000);
            }
        }

        if (location.href.includes('/docview')) {
            if (state.phase === 'VIEWING_DOCUMENT') {
                log(\`📖 關鍵字 "\${currentKeyword}" -> 正在瀏覽第 \${state.viewedCount} 筆資料...\`);

                if (state.viewedCount >= TARGET_COUNT) {
                    log(\`🎉 關鍵字 "\${currentKeyword}" 已經達到目標 \${TARGET_COUNT} 筆！\`);
                    state.keywordIndex += 1;
                    
                    const limit = state.maxKeywords || KEYWORDS.length;
                    if (state.keywordIndex >= limit || state.keywordIndex >= KEYWORDS.length) {
                        state.phase = 'IDLE';
                        saveState(state);
                        alert("✅ ProQuest 自動化本次任務全數完成！");
                        return;
                    } else {
                        state.phase = 'START_SEARCH';
                        state.viewedCount = 0;
                        saveState(state);
                        setTimeout(() => { window.location.href = getBaseUrl(state.accountId); }, 3000);
                        return; 
                    }
                }

                setTimeout(async () => {
                    const nextBtn = await waitForElement(SELECTORS.nextDocBtn);
                    if (nextBtn) {
                        state.viewedCount += 1;
                        saveState(state);
                        if (nextBtn.tagName.toLowerCase() === 'a' && nextBtn.href) window.location.href = nextBtn.href;
                        else nextBtn.click();
                    } else {
                        state.phase = 'PAUSED_FOR_TESTING';
                        saveState(state);
                    }
                }, STEP_DELAY);
            }
        }
    };

    const injectUI = () => {
        if (document.getElementById('pq-auto-panel')) return;
        const panel = document.createElement('div');
        panel.id = 'pq-auto-panel';
        panel.style = "position:fixed; top:20px; right:20px; z-index:2147483647; background:white; padding:15px; border:4px solid #0ea5e9; border-radius:12px; box-shadow: 0 10px 40px rgba(0,0,0,0.5); width:180px; text-align:center; font-family: Arial, sans-serif;";
        panel.innerHTML = \`
            <div style="font-size:14px; font-weight:bold; color:#0ea5e9; margin-bottom:10px;">ProQuest 逐筆助手</div>
            <button id="pq-start" style="width:100%; background:#28a745; color:white; border:none; padding:10px; border-radius:8px; cursor:pointer; font-weight:bold; margin-bottom:5px;">🚀 啟動完整循環</button>
            <button id="pq-reset" style="width:100%; background:#6c757d; color:white; border:none; padding:8px; border-radius:8px; cursor:pointer; font-size:12px;">🛑 重置進度</button>
        \`;
        (document.body || document.documentElement).appendChild(panel);
        
        document.getElementById('pq-start').onclick = () => {
            const totalListCount = KEYWORDS.length;
            const runCountInput = window.prompt("目前清單共有 " + totalListCount + " 個關鍵字。\\n請問本次任務要執行「幾個」關鍵字？", totalListCount);
            if (runCountInput === null) return; 
            let runCount = parseInt(runCountInput, 10);
            if (isNaN(runCount) || runCount <= 0) return;

            const startInput = window.prompt("請問要從第幾個關鍵字開始執行？\\n(輸入 1 代表從第 1 個開始，上限為 " + totalListCount + ")", 1);
            if (startInput === null) return;
            let startIdx = parseInt(startInput, 10);
            if (isNaN(startIdx) || startIdx <= 0) startIdx = 1;
            if (startIdx > totalListCount) startIdx = totalListCount;
            
            const actualStartIndex = startIdx - 1;
            let endLimit = actualStartIndex + runCount;
            if (endLimit > totalListCount) {
                endLimit = totalListCount;
                runCount = endLimit - actualStartIndex;
            }

            const countInput = window.prompt("請確認每個詞的「目標瀏覽筆數」：", ${defaultTargetCount});
            if (countInput === null) return;
            const tCount = parseInt(countInput, 10);
            if (isNaN(tCount) || tCount <= 0) return;

            const delayInput = window.prompt("請確認「翻頁間隔」時間 (毫秒)：", ${defaultDelay});
            if (delayInput === null) return;
            const tDelay = parseInt(delayInput, 10);
            if (isNaN(tDelay) || tDelay < 0) return;

            const totalDocs = runCount * tCount;
            const confirmMsg = "請確認本次任務資訊：\\n\\n執行範圍：第 " + startIdx + " 個 到 第 " + endLimit + " 個關鍵字\\n總計執行單字：" + runCount + " 個\\n每個詞的瀏覽筆數：" + tCount + " 筆\\n-------------------------\\n總計：" + totalDocs + " 篇\\n\\n翻頁間隔：" + tDelay + " 毫秒\\n\\n按下「確定」開始運行腳本！";
            if (!window.confirm(confirmMsg)) return; 
            
            saveState({ keywordIndex: actualStartIndex, viewedCount: 0, phase: 'START_SEARCH', maxKeywords: endLimit, targetCount: tCount, stepDelay: tDelay, accountId: getState().accountId });
            location.reload(); 
        };
        
        document.getElementById('pq-reset').onclick = () => {
            saveState({ keywordIndex: 0, viewedCount: 0, phase: 'IDLE', accountId: null });
            location.reload();
        };
    };

    if (document.readyState === 'loading') { window.addEventListener('DOMContentLoaded', () => { setInterval(injectUI, 2000); run(); }); } 
    else { setInterval(injectUI, 2000); run(); }
})();`;
            } else if (currentMode === 'print') {
                const defaultPrintCount = printCountInput.value;
                
                return `// ==UserScript==
// @name         ProQuest 深度自動化批次助手 (模式二：批次列印)
// @namespace    http://tampermonkey.net/
// @version      1.1.22
// @description  全自動化正式版：結合早期成功範圍定位與動態等待，完美解決客製化 100 筆下拉選單失效問題
// @author       Gemini Assistant
// @match        *://www.proquest.com/*
// @run-at       document-start
// @grant        GM_addStyle
// @grant        GM_log
// ==/UserScript==

(function() {
    'use strict';

    const SELECTORS = {
        searchBox:   'textarea#searchTerm, input#searchTerm, input[name="searchTerm"]', 
        fullTextCb:  'input#fullTextLimit, input#ft, input[name="isFullText"]',          
        searchBtn:   'a#expandedSearch, #searchSubmit, .searchButton',                
        
        itemsCombo:   '#itemsPerPage-combo',          
        itemsListbox: '#itemsPerPage-listbox',        
        selectAllCb:  'input#mlcbAll, #selectall, .select-all-checkbox',
        nextPageBtn:  'li.next a, a[title="Next page"], a[title="下一頁"], [aria-label="Next page"]',

        exportMenuBtn: 'a#allSaveOptionsLink, a[title*="所有儲存"], a[title*="All save"]',
        printBtn:      'a#printLink, a[title="Print" i], a[title="列印" i], a[title="Print document" i], [data-format="print"], .format-print',

        deselectCb:    'input#deselectItems, input[name="deselectItems"], input#removeSelectedAfterExport, input[name="removeSelectedAfterExport"]',
        captchaFrame:  'iframe[src*="hcaptcha"], iframe[src*="recaptcha"], .g-recaptcha',

        closeModalBtn: '#closeWarningModalLink, #endSessionWarningCarryOn, button.close, .ui-dialog-titlebar-close'
    };

    const KEYWORDS = ${keywordJson};
    const AJAX_DELAY = 5000; 

    const log = (msg) => { console.log("%c[PQ-Auto-列印] " + msg, "color: white; background: #059669; padding: 4px 8px; font-weight: bold; border-radius: 4px; font-size: 13px;"); };

    const getState = () => {
        try {
            return JSON.parse(localStorage.getItem('pq_print_state')) || { keywordIndex: 0, selectedCount: 0, phase: 'IDLE', maxKeywords: KEYWORDS.length, targetCount: ${defaultPrintCount}, accountId: null };
        } catch(e) { 
            return { keywordIndex: 0, selectedCount: 0, phase: 'IDLE', maxKeywords: KEYWORDS.length, targetCount: ${defaultPrintCount}, accountId: null }; 
        }
    };
    const saveState = (s) => localStorage.setItem('pq_print_state', JSON.stringify(s));

    const getBaseUrl = (stateAccId) => {
        return stateAccId ? "https://www.proquest.com/index?accountid=" + stateAccId : "https://www.proquest.com/index";
    };

    const waitForElement = (selector, timeout = 15000, requireVisible = true) => {
        return new Promise((resolve) => {
            const checkEl = () => {
                const el = document.querySelector(selector);
                if (!el) return null;
                if (!requireVisible) return el;
                const rect = el.getBoundingClientRect();
                if (rect.width > 0 && rect.height > 0) return el;
                return null;
            };

            const initialEl = checkEl();
            if (initialEl) return resolve(initialEl);

            const observer = new MutationObserver(() => {
                const el = checkEl();
                if (el) { observer.disconnect(); resolve(el); }
            });
            observer.observe(document.documentElement, { childList: true, subtree: true, attributes: true, attributeFilter: ['style', 'class'] });
            setTimeout(() => { observer.disconnect(); resolve(null); }, timeout);
        });
    };

    const run = async () => {
        let state = getState();
        
        const urlAccId = new URLSearchParams(window.location.search).get('accountid');
        if (urlAccId && state.accountId !== urlAccId) {
            state.accountId = urlAccId;
            saveState(state);
        }

        if (state.phase === 'IDLE' || state.phase === 'PAUSED_FOR_TESTING') return;

        const TARGET_COUNT = state.targetCount || ${defaultPrintCount};

        try {
            const modalBtn = document.querySelector(SELECTORS.closeModalBtn);
            if (modalBtn && modalBtn.offsetParent !== null) modalBtn.click();
        } catch(e) {}

        const limit = state.maxKeywords || KEYWORDS.length;
        if (state.keywordIndex >= limit || state.keywordIndex >= KEYWORDS.length) {
            log("🎉 本次設定的關鍵字任務已全部完成！");
            saveState({...state, phase: 'IDLE'});
            return;
        }

        const currentKeyword = KEYWORDS[state.keywordIndex];
        const isSearchPage = location.pathname === '/' || location.pathname.startsWith('/index') || location.href.includes('/search') || location.search.includes('accountid');
        
        if (state.phase === 'RETURN_TO_HOME') {
            const returnToHome = async () => {
                log("⏳ 準備切換至下一個關鍵字，正在安全地尋找首頁標誌...");
                
                let logo = null;
                const headerArea = document.querySelector('header, nav, .navbar, #navbar, #topNavigation, [role="banner"]');
                if (headerArea) {
                    const links = Array.from(headerArea.querySelectorAll('a'));
                    logo = links.find(a => {
                        const href = a.href || '';
                        const title = (a.title || '').toLowerCase();
                        const text = (a.textContent || '').toLowerCase();
                        
                        if (href.includes('/docview/') || href.includes('/results')) return false; 
                        
                        return title.includes('proquest') || text.includes('proquest') || title.includes('home') || a.classList.contains('navbar-brand') || a.classList.contains('brand') || a.querySelector('img[alt*="ProQuest" i]');
                    });
                }

                state.keywordIndex += 1;
                state.selectedCount = 0;
                
                const finalLimit = state.maxKeywords || KEYWORDS.length;
                if (state.keywordIndex >= finalLimit || state.keywordIndex >= KEYWORDS.length) {
                    state.phase = 'IDLE';
                    saveState(state);
                    alert("🎉 恭喜！您設定的所有關鍵字批次列印任務已「全數完成」！\\n\\n太棒了，腳本已成功為您處理完畢！");
                    if (logo) logo.click();
                    else window.location.href = getBaseUrl(state.accountId);
                    return;
                }

                state.phase = 'START_SEARCH';
                saveState(state);

                log("✅ 任務推進！準備執行下一個關鍵字。");
                if (logo) {
                    log("👉 找到標誌，執行點擊返回首頁。");
                    logo.click();
                    setTimeout(() => { window.location.href = getBaseUrl(state.accountId); }, 3000); 
                } else {
                    log("⚠️ 使用保險機制：將帶有記憶 ID 的網址重導向返回首頁...");
                    window.location.href = getBaseUrl(state.accountId);
                }
            };
            returnToHome();
            return;
        }

        if (state.phase === 'CLEAR_SELECTION_AND_RETURN') {
            const doClearAndReturn = async () => {
                log("⏳ 觸發強制清除機制：正在等待頁面載入並尋找「清除」按鈕...");
                
                let clearBtn = await waitForElement('a#clearSelectedItems, a#clearSelected, a.clear-selected, a[title*="清除" i], a[title*="Clear" i]', 10000, true);
                
                if (!clearBtn) {
                    const links = Array.from(document.querySelectorAll('a, button, span')).filter(el => {
                        const rect = el.getBoundingClientRect();
                        return rect.width > 0 && rect.height > 0;
                    });
                    clearBtn = links.find(btn => {
                        const text = (btn.textContent || '').trim().toLowerCase();
                        return text === '清除' || text === 'clear';
                    });
                }

                if (clearBtn) {
                    clearBtn.click();
                    log("👉 已點擊「清除」按鈕，等待確認對話框...");
                    
                    let yesBtn = null;
                    let attempts = 0;
                    while (attempts < 15) { 
                        await new Promise(r => setTimeout(r, 500));
                        const dialogs = Array.from(document.querySelectorAll('.ui-dialog, .modal, [role="dialog"], .dialog')).filter(d => getComputedStyle(d).visibility !== 'hidden');
                        const activeModal = dialogs.length > 0 ? dialogs[dialogs.length - 1] : document.body;
                        
                        const buttons = Array.from(activeModal.querySelectorAll('button, a.btn, input[type="button"]'));
                        yesBtn = buttons.find(btn => {
                            const rect = btn.getBoundingClientRect();
                            if (rect.width > 0 && rect.height > 0) { 
                                const text = (btn.textContent || btn.value || '').trim().toLowerCase();
                                return text === '是' || text === 'yes' || text === '確認' || text === 'confirm' || text === 'ok';
                            }
                            return false;
                        });
                        if (yesBtn) break;
                        attempts++;
                    }

                    if (yesBtn) {
                        yesBtn.click();
                        log("✅ 點擊確認，清除完成。");
                        await new Promise(r => setTimeout(r, 2000)); 
                    } else {
                        log("⚠️ 找不到確認按鈕，可能系統不需要再次確認。");
                        await new Promise(r => setTimeout(r, 2000));
                    }
                } else {
                    log("⚠️ 找不到「清除」按鈕，可能已經清空。");
                }
                
                state.phase = 'RETURN_TO_HOME';
                saveState(state);
                log("✅ 清除動作結束，準備回到首頁...");
                window.location.reload(); 
            };
            doClearAndReturn();
            return;
        }

        const handlePrintCompletion = () => {
            log("⏳ 正在等待系統產生列印文件 (精準掃描「準備文件」字樣中，請耐心等候)...");

            let attempts = 0;
            const maxAttempts = 90; 
            
            const checkTimer = setInterval(async () => {
                attempts++;
                
                const visibleText = document.body.innerText.replace(/\\s+/g, '').toLowerCase();
                
                const isStillLoading = visibleText.includes('準備文件') || 
                                       visibleText.includes('preparingdocument') || 
                                       visibleText.includes('loading...') || 
                                       visibleText.includes('請稍候');

                if (!isStillLoading) {
                    log("✅ 畫面上已無「準備文件」等字樣，研判 180 秒內載入已完成！尋找返回按鈕...");
                    
                    let backBtn = document.querySelector('a#backToResults, .backToResults, a[title*="返回上一頁"], a[title*="Back to results"]');
                    
                    if (!backBtn) {
                        const links = Array.from(document.querySelectorAll('a, button, span')).filter(el => {
                            const rect = el.getBoundingClientRect();
                            return rect.width > 0 && rect.height > 0;
                        });
                        backBtn = links.find(btn => {
                            if (btn.children.length > 2) return false;
                            const text = (btn.textContent || '').trim().toLowerCase();
                            return text === '返回上一頁' || text.includes('返回上一頁') || text.includes('back to results');
                        });
                        if (backBtn && backBtn.tagName !== 'A' && backBtn.tagName !== 'BUTTON') {
                            const parentA = backBtn.closest('a') || backBtn.closest('button');
                            if (parentA) backBtn = parentA;
                        }
                    }

                    if (backBtn) {
                        clearInterval(checkTimer);
                        log("✅ 成功找到「返回上一頁」按鈕，執行正常點擊跳轉！");
                        
                        state.phase = 'RETURN_TO_HOME';
                        saveState(state);
                        
                        backBtn.click();
                    } else {
                        log("⚠️ 載入看似完成，但還沒找到「返回上一頁」按鈕，持續尋找中...");
                    }
                } else {
                    log(\`⏳ 文件準備中，請稍候... (已等待 \${attempts * 2} 秒)\`);
                }
                
                if (attempts >= maxAttempts) {
                    clearInterval(checkTimer);
                    log("⚠️ 等待文件產生達 180 秒，觸發強制返回並清除機制！");
                    
                    let backBtn = document.querySelector('a#backToResults, .backToResults, a[title*="返回上一頁"], a[title*="Back to results"]');
                    if (!backBtn) {
                        const links = Array.from(document.querySelectorAll('a, button, span')).filter(el => {
                            const rect = el.getBoundingClientRect();
                            return rect.width > 0 && rect.height > 0;
                        });
                        backBtn = links.find(btn => {
                            if (btn.children.length > 2) return false;
                            const text = (btn.textContent || '').trim().toLowerCase();
                            return text === '返回上一頁' || text.includes('返回上一頁') || text.includes('back to results');
                        });
                        if (backBtn && backBtn.tagName !== 'A' && backBtn.tagName !== 'BUTTON') {
                            const parentA = backBtn.closest('a') || backBtn.closest('button');
                            if (parentA) backBtn = parentA;
                        }
                    }

                    if (backBtn) {
                        log("✅ 找到「返回上一頁」按鈕，準備執行強制退出與清除！");
                        state.phase = 'CLEAR_SELECTION_AND_RETURN';
                        saveState(state);
                        backBtn.click();
                        setTimeout(() => { window.history.back(); }, 5000);
                    } else {
                        log("❌ 找不到返回按鈕，將使用瀏覽器返回上一頁並進入清除階段...");
                        state.phase = 'CLEAR_SELECTION_AND_RETURN';
                        saveState(state);
                        window.history.back();
                    }
                }
            }, 2000); 
        };

        if (state.phase === 'WAITING_FOR_PRINT_COMPLETION') {
            handlePrintCompletion();
            return;
        }

        const processPrintModal = async () => {
            log("⏳ 正在等待列印選項對話框實體化載入...");
            
            let continueBtn = null;
            let activeModal = null;
            let attempts = 0;
            const maxAttempts = 180; 

            while (attempts < maxAttempts) {
                const dialogBoxes = Array.from(document.querySelectorAll('.ui-dialog, .modal, [role="dialog"], .dialog')).filter(d => {
                    const rect = d.getBoundingClientRect();
                    return rect.width > 0 && rect.height > 0 && getComputedStyle(d).visibility !== 'hidden';
                });
                activeModal = dialogBoxes.length > 0 ? dialogBoxes[dialogBoxes.length - 1] : document.body;

                const buttons = Array.from(activeModal.querySelectorAll('button, a.btn, input[type="submit"], input[type="button"], .ui-button, .btn'));
                continueBtn = buttons.find(btn => {
                    const rect = btn.getBoundingClientRect();
                    if (rect.width > 0 && rect.height > 0) { 
                        const text = (btn.textContent || btn.value || '').trim().toLowerCase();
                        if (text.includes('取消') || text.includes('cancel') || text.includes('close') || text.includes('關閉')) return false;
                        return text.includes('繼續') || text.includes('continue');
                    }
                    return false;
                });

                if (continueBtn) break; 
                await new Promise(r => setTimeout(r, 1000));
                attempts++;
            }
            
            if (!continueBtn) {
                log("❌ 等待列印對話框載入超時。測試暫停。");
                state.phase = 'PAUSED_FOR_TESTING';
                saveState(state);
                return;
            }

            log("✅ 列印對話框已載入！已將操作範圍鎖定在對話框內...");
            await new Promise(r => setTimeout(r, 1000)); 

            let deselectCb = activeModal.querySelector(SELECTORS.deselectCb);
            let targetLabel = null;

            if (!deselectCb) {
                const elements = Array.from(activeModal.querySelectorAll('label, span, div, p')).filter(el => {
                    const rect = el.getBoundingClientRect();
                    return rect.width > 0 && rect.height > 0; 
                });

                targetLabel = elements.find(l => {
                    if (l.children.length > 3) return false; 
                    const t = l.textContent || '';
                    return t.includes('完成時取消選擇項目') || t.includes('取消選擇') || t.includes('Deselect');
                });

                if (targetLabel) {
                    if (targetLabel.getAttribute('for')) deselectCb = activeModal.querySelector('#' + targetLabel.getAttribute('for'));
                    if (!deselectCb) deselectCb = targetLabel.querySelector('input[type="checkbox"]');
                    if (!deselectCb && targetLabel.parentElement) deselectCb = targetLabel.parentElement.querySelector('input[type="checkbox"]');
                }
            }

            if (deselectCb) {
                if (!deselectCb.checked) {
                    const label = activeModal.querySelector('label[for="' + deselectCb.id + '"]') || deselectCb.closest('label');
                    if (label) label.click();
                    else deselectCb.click();
                    
                    if (!deselectCb.checked) {
                        deselectCb.checked = true; 
                        deselectCb.dispatchEvent(new Event('change', { bubbles: true }));
                    }
                }
            } else if (targetLabel) {
                targetLabel.click();
            }

            await new Promise(r => setTimeout(r, 500));

            const captcha = activeModal.querySelector(SELECTORS.captchaFrame) || document.querySelector(SELECTORS.captchaFrame);
            let captchaVisible = false;
            if (captcha) {
                const rect = captcha.getBoundingClientRect();
                if (rect.width > 0 && rect.height > 0) captchaVisible = true;
            }

            if (captchaVisible) {
                log("⚠️ 偵測到驗證碼！等待人工處理...");
                state.phase = 'WAITING_FOR_PRINT_COMPLETION';
                saveState(state);
                alert("⚠️ 畫面出現驗證碼！腳本已成功為您打勾。\\n\\n👉 請手動解驗證，並【親自點擊右下角的繼續】。\\n腳本會在背景安靜等候，直到文件產生完成。");
                setTimeout(() => { handlePrintCompletion(); }, 5000); 
            } else {
                log("✅ 無驗證碼，準備自動點擊「繼續」...");
                setTimeout(() => {
                    const finalRect = continueBtn.getBoundingClientRect();
                    if(finalRect.width > 0 && finalRect.height > 0) {
                        continueBtn.click();
                        log("✅ 已成功點擊「繼續」按鈕！進入文件準備階段...");
                        
                        state.phase = 'WAITING_FOR_PRINT_COMPLETION';
                        saveState(state);
                        
                        setTimeout(() => {
                            if (getState().phase === 'WAITING_FOR_PRINT_COMPLETION') {
                                handlePrintCompletion();
                            }
                        }, 2000);

                    } else {
                        log("❌ 「繼續」按鈕突然消失或被遮擋。測試暫停。");
                        state.phase = 'PAUSED_FOR_TESTING';
                        saveState(state);
                    }
                }, 1000); 
            }
        };

        if (state.phase === 'START_SEARCH' && isSearchPage) {
            log(\`準備輸入第 \${state.keywordIndex + 1}/\${limit} 個關鍵字: "\${currentKeyword}"\`);
            try {
                const targetSearchBox = await waitForElement(SELECTORS.searchBox);
                if (targetSearchBox) {
                    const fullTextCb = document.querySelector(SELECTORS.fullTextCb);
                    if (fullTextCb && !fullTextCb.checked) fullTextCb.click();
                    
                    targetSearchBox.value = currentKeyword;
                    targetSearchBox.dispatchEvent(new Event('input', { bubbles: true }));
                    
                    state.phase = 'SELECTING_RESULTS';
                    state.selectedCount = 0; 
                    saveState(state);
                    
                    setTimeout(() => {
                        const btn = document.querySelector(SELECTORS.searchBtn);
                        if (btn) btn.click();
                        else if (targetSearchBox.closest('form')) targetSearchBox.closest('form').submit();
                    }, 1500);
                }
            } catch (err) {}
            return;
        }

        if (location.href.includes('/results')) {
            if (state.phase === 'WAITING_FOR_PRINT_MODAL') {
                processPrintModal();
                return;
            }

            if (state.phase === 'SELECTING_RESULTS') {
                log("進入搜尋結果頁，準備設定每頁筆數並勾選...");

                const doSelectAll = async () => {
                    log(\`正在尋找並點擊全選按鈕 (目前進度: \${state.selectedCount}/\${TARGET_COUNT})...\`);
                    
                    const selectAllCb = await waitForElement(SELECTORS.selectAllCb);
                    if (selectAllCb) {
                        let attempts = 0;
                        const ensureChecked = new Promise((resolve) => {
                            const checkTimer = setInterval(() => {
                                if (selectAllCb.checked) {
                                    clearInterval(checkTimer);
                                    resolve(true);
                                } else {
                                    attempts++;
                                    if (attempts > 15) { 
                                        clearInterval(checkTimer);
                                        resolve(false);
                                    } else {
                                        const label = document.querySelector('label[for="' + selectAllCb.id + '"]');
                                        if (label) label.click();
                                        else selectAllCb.click();
                                        selectAllCb.dispatchEvent(new Event('change', { bubbles: true }));
                                    }
                                }
                            }, 1000);
                        });

                        const isChecked = await ensureChecked;

                        if (!isChecked) {
                            log("❌ 無法成功勾選全選按鈕。測試暫停。");
                            state.phase = 'PAUSED_FOR_TESTING';
                            saveState(state);
                            return;
                        }

                        log("✅ 已成功執行全選動作！等待系統紀錄...");
                        await new Promise(r => setTimeout(r, 2000));

                        state.selectedCount += 100;
                        saveState(state);

                        if (state.selectedCount < TARGET_COUNT) {
                            log(\`🔄 尚未達標 (\${state.selectedCount}/\${TARGET_COUNT})，準備前往下一頁...\`);
                            const nextBtn = document.querySelector(SELECTORS.nextPageBtn);
                            if (nextBtn) {
                                nextBtn.click();
                                setTimeout(doSelectAll, AJAX_DELAY); 
                            } else {
                                log("❌ 找不到「下一頁」按鈕。測試暫停。");
                                state.phase = 'PAUSED_FOR_TESTING';
                                saveState(state);
                            }
                        } else {
                            log(\`🎉 已選取 \${TARGET_COUNT} 筆資料！準備點開匯出選單...\`);

                            setTimeout(async () => {
                                const exportBtn = await waitForElement(SELECTORS.exportMenuBtn, 15000, true);
                                if (exportBtn) {
                                    exportBtn.click();
                                    log("✅ 已點開匯出選單！等待列印按鈕浮現...");

                                    const printBtn = await waitForElement(SELECTORS.printBtn, 10000, true); 
                                    if (printBtn) {
                                        await new Promise(r => setTimeout(r, 500)); 
                                        printBtn.click();
                                        log("✅ 已精準點擊「列印」按鈕！");
                                        
                                        state.phase = 'WAITING_FOR_PRINT_MODAL';
                                        saveState(state);
                                        processPrintModal();
                                    } else {
                                        log("❌ 找不到可見的「列印」按鈕。測試暫停。");
                                        state.phase = 'PAUSED_FOR_TESTING';
                                        saveState(state);
                                    }
                                } else {
                                    log("❌ 找不到可見的「匯出選單」按鈕。測試暫停。");
                                    state.phase = 'PAUSED_FOR_TESTING';
                                    saveState(state);
                                }
                            }, 2000); 
                        }
                    }
                };

                // 【核心升級 v1.1.22】結合早期成功經驗與動態等待，精準捕捉客製化選單內的選項
                const itemsCombo = await waitForElement(SELECTORS.itemsCombo, 5000, true);
                
                if (itemsCombo) {
                    if (!itemsCombo.textContent.includes('100')) {
                        log("🔄 每頁筆數不是 100 筆，準備點開下拉選單...");
                        itemsCombo.click();
                        
                        let targetOption = null;
                        let attempts = 0;
                        while (attempts < 15) { // 等待最多 7.5 秒讓選單動畫與 DOM 渲染完成
                            await new Promise(r => setTimeout(r, 500)); 
                            
                            // 找回早期成功的 listbox 範圍限制，避免在全畫面抓到其他包含 100 的無關文字
                            const listbox = document.querySelector(SELECTORS.itemsListbox);
                            if (listbox) {
                                const options = listbox.querySelectorAll('[role="option"], li, a, div');
                                targetOption = Array.from(options).find(opt => opt.textContent.trim() === '100');
                                if (targetOption) break;
                            }
                            attempts++;
                        }

                        if (targetOption) {
                            targetOption.click();
                            log("✅ 成功捕捉並點選 100 筆！等待系統重整...");
                            setTimeout(doSelectAll, AJAX_DELAY); 
                        } else {
                            log("⚠️ 畫面中未能捕捉到 100 筆的選項，將檢查是否有原生備用選單...");
                            
                            // 【安全備案】如果客製選單真的壞了，再試著找原生的隱藏 <select>
                            const nativeSelect = document.querySelector('select#itemsPerPage, select[name="itemsPerPage"]');
                            if (nativeSelect && nativeSelect.value !== '100') {
                                log("🔄 嘗試使用原生下拉選單切換 100 筆...");
                                nativeSelect.value = '100';
                                nativeSelect.dispatchEvent(new Event('change', { bubbles: true }));
                                setTimeout(doSelectAll, AJAX_DELAY);
                            } else {
                                log("⚠️ 無法切換至 100 筆，將以目前筆數繼續執行...");
                                doSelectAll();
                            }
                        }
                        return; 
                    } else {
                        setTimeout(doSelectAll, 1500);
                    }
                } else {
                    setTimeout(doSelectAll, 1500);
                }
            }
        }
    };

    const injectUI = () => {
        if (document.getElementById('pq-auto-panel')) return;
        const panel = document.createElement('div');
        panel.id = 'pq-auto-panel';
        panel.style = "position:fixed; top:20px; right:20px; z-index:2147483647; background:white; padding:15px; border:4px solid #059669; border-radius:12px; box-shadow: 0 10px 40px rgba(0,0,0,0.5); width:180px; text-align:center; font-family: Arial, sans-serif;";
        panel.innerHTML = \`
            <div style="font-size:14px; font-weight:bold; color:#059669; margin-bottom:10px;">ProQuest 列印助手</div>
            <button id="pq-start" style="width:100%; background:#28a745; color:white; border:none; padding:10px; border-radius:8px; cursor:pointer; font-weight:bold; margin-bottom:5px;">🚀 啟動列印循環</button>
            <button id="pq-reset" style="width:100%; background:#6c757d; color:white; border:none; padding:8px; border-radius:8px; cursor:pointer; font-size:12px;">🛑 重置進度</button>
        \`;
        (document.body || document.documentElement).appendChild(panel);
        
        document.getElementById('pq-start').onclick = () => {
            const totalListCount = KEYWORDS.length;
            const runCountInput = window.prompt("目前清單共有 " + totalListCount + " 個關鍵字。\\n請問本次任務要執行「幾個」關鍵字？", totalListCount);
            if (runCountInput === null) return; 
            let runCount = parseInt(runCountInput, 10);
            if (isNaN(runCount) || runCount <= 0) return;

            const startInput = window.prompt("請問要從第幾個關鍵字開始執行？\\n(輸入 1 代表從第 1 個開始，上限為 " + totalListCount + ")", 1);
            if (startInput === null) return;
            let startIdx = parseInt(startInput, 10);
            if (isNaN(startIdx) || startIdx <= 0) startIdx = 1;
            if (startIdx > totalListCount) startIdx = totalListCount;
            
            const actualStartIndex = startIdx - 1;
            let endLimit = actualStartIndex + runCount;
            if (endLimit > totalListCount) {
                endLimit = totalListCount;
                runCount = endLimit - actualStartIndex;
            }

            const countInput = window.prompt("請確認每個詞的「目標列印筆數」\\n(注意：必須為 100 的倍數！)：", ${defaultPrintCount});
            if (countInput === null) return;
            const tCount = parseInt(countInput, 10);
            if (isNaN(tCount) || tCount <= 0 || tCount % 100 !== 0) { 
                alert("目標列印筆數必須是 100 的倍數（例如：100, 200, 300）。"); 
                return; 
            }

            const totalDocs = runCount * tCount;
            const confirmMsg = "請確認批次列印任務資訊：\\n\\n執行範圍：第 " + startIdx + " 個 到 第 " + endLimit + " 個關鍵字\\n總計執行單字：" + runCount + " 個\\n每個詞的列印筆數：" + tCount + " 筆\\n-------------------------\\n總計列印：" + totalDocs + " 篇\\n\\n按下「確定」開始運行腳本！";
            if (!window.confirm(confirmMsg)) return; 
            
            saveState({ keywordIndex: actualStartIndex, selectedCount: 0, phase: 'START_SEARCH', maxKeywords: endLimit, targetCount: tCount, accountId: getState().accountId });
            location.reload(); 
        };
        
        document.getElementById('pq-reset').onclick = () => {
            saveState({ keywordIndex: 0, selectedCount: 0, phase: 'IDLE', accountId: null });
            location.reload();
        };
    };

    if (document.readyState === 'loading') { window.addEventListener('DOMContentLoaded', () => { setInterval(injectUI, 2000); run(); }); } 
    else { setInterval(injectUI, 2000); run(); }
})();`;
            }
        }

        // === 綁定複製按鈕事件 ===
        copyBtn.addEventListener('click', () => {
            const scriptContent = generateScript();
            
            const textArea = document.createElement("textarea");
            textArea.value = scriptContent;
            textArea.style.position = "fixed";
            textArea.style.left = "-9999px";
            document.body.appendChild(textArea);
            
            textArea.select();
            document.execCommand('copy');
            document.body.removeChild(textArea);
            
            // 變更圖示與樣式
            copyIcon.className = "ph ph-check-circle text-xl";
            const originalText = copyText.textContent;
            copyText.textContent = "✅ 複製成功！";
            
            // 根據不同模式切換複製成功的顏色
            const originalClasses = copyBtn.className;
            copyBtn.className = "cursor-pointer w-full py-4 mt-2 bg-emerald-500 text-white font-bold rounded-xl shadow-lg transition-all active:scale-95 flex items-center justify-center gap-2";
            
            setTimeout(() => {
                copyIcon.className = "ph ph-copy text-xl";
                copyText.textContent = originalText;
                copyBtn.className = originalClasses; 
            }, 2000);
        });
    </script>
</body>
</html>
